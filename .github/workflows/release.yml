name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    env:
      GKS_EMBEDDER: mock
      GKS_LOG_LEVEL: warn

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack
        run: npm pack

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARBALL=$(ls *.tgz)
          VERSION=${GITHUB_REF_NAME}
          gh release create "$VERSION" "$TARBALL" \
            --title "$VERSION" \
            --notes "## Install

          \`\`\`sh
          npm install https://github.com/${{ github.repository }}/releases/download/${VERSION}/$(echo $TARBALL)
          \`\`\`

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${VERSION}/CHANGELOG.md) for full details."

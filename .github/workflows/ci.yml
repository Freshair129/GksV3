name: ci

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    env:
      # Use the deterministic mock embedder so CI doesn't need Ollama/OpenAI.
      GKS_EMBEDDER: mock
      GKS_LOG_LEVEL: warn

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: LoCoMo smoke (tiny fixture)
        run: npm run bench:locomo -- --dataset=./benchmarks/data/locomo-tiny.json --top-k=5 --threshold=-1
